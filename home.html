<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payoo Home</title>
    <link rel="shortcut icon" href="./assets/logo.png" type="image/x-icon">

    <!-- tailwind + daisyui -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">

    <!-- icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <style>
        * {
            font-family: "Outfit", sans-serif;

        }
    </style>
</head>

<body class="min-h-screen max-w-md bg-base-200 mx-auto">


    <header class="border-b-2 border-gray-200 sticky top-0 bg-base-200">
        <section class="px-6 pt-11 pb-3 flex justify-between items-center">
            <div class="left flex gap-2">
                <img src="./assets/logo.png" class="w-15" alt="">
                <div class="flex flex-col">
                    <h4 class="font-extrabold text-[18px]">$<span id="balance">45000</span></h4>
                    <p class="text-neutral/50">Available Balance</p>
                </div>
            </div>
            <div class="right">
                <a href="./index.html" class="btn btn-soft">
                    <i class="fa-solid fa-arrow-right-from-bracket"></i>Log Out
                </a>
            </div>
        </section>
    </header>



    <section class="px-6 space-y-4 py-7">
        <h1 class="text-[24px] font-bold">Welcome to Pay<span class="text-primary">oo</span></h1>
        <p class="text-neutral/50">Enjoy easy and convenient financial services with us. Cashout charge is low and </p>
    </section>


    <section class="px-6 grid grid-cols-3 grid-rows-2 gap-4 border-b border-gray-300 rounded-2xl pb-4">
        <button onclick="showOnly('add-money')" class="btn btn-primary btn-soft flex flex-col h-full p-5 rounded-xl border border-gray-300">
            <img src="./assets/opt-1.png" alt="">
            <p class="">Add Money</p>
        </button>
        <button onclick="showOnly('cashout')" class="btn btn-primary btn-soft flex flex-col h-full p-5 rounded-xl border-gray-300">
            <img src="./assets/opt-2.png" alt="">
            <p>Cashout</p>
        </button>
        <button onclick="showOnly('transfer-money')" class="btn btn-primary btn-soft flex flex-col h-full p-5 rounded-xl border-gray-300">
            <img src="./assets/opt-3.png" alt="">
            <p>Transfer Money</p>
        </button>
        <button class="btn btn-primary btn-soft flex flex-col h-full p-5 rounded-xl border-gray-300">
            <img src="./assets/opt-4.png" alt="">
            <p>Get Bonus</p>
        </button>
        <button onclick="showOnly('pay-bill')" class="btn btn-primary btn-soft flex flex-col h-full p-5 rounded-xl border-gray-300">
            <img src="./assets/opt-5.png" alt="">
            <p>Pay Bill</p>
        </button>
        <button class="btn btn-primary btn-soft flex flex-col h-full p-5 rounded-xl border-gray-300">
            <img src="./assets/opt-6.png" alt="">
            <p>Transactions</p>
        </button>
    </section>

    <section id="add-money" class="px-6 hidden">
        <h1 class="text-[18px] font-semibold py-4">Add Money</h1>

        <div class="form">
            <div class="card bg-base-100 w-full shadow rounded-2xl">
                <div class="card-body">
                    <fieldset class="fieldset space-y-2">
                        <label class="label font-bold text-neutral">Select a Bank</label>

                        <select id="add-money-bank" class="select input rounded-full bg-base-200 w-full">
                            <option disabled selected>Select Bank</option>
                            <option value="Sonali Bank">Sonali Bank</option>
                            <option value="UCB">UCB</option>
                            <option value="Islami Bank">Islami Bank</option>
                        </select>
                        <label class="label font-bold text-neutral">Bank Account Number</label>
                        <input id="add-money-number" maxlength="11" minlength="11" type="text"
                            class="input rounded-full bg-base-200 w-full" placeholder="Enter 11 digit account number" />
                        <label class="label font-bold text-neutral">Amount to Add</label>
                        <input id="add-money-amount" type="text" class="input rounded-full bg-base-200 w-full"
                            placeholder="Add amount" />
                        <label class="label font-bold text-neutral">Pin Number</label>
                        <input id="add-money-pin" maxlength="4" type="password"
                            class="input rounded-full bg-base-200 w-full" placeholder="Enter 4 digit pin number" />
                        <button id="add-money-btn" class="btn btn-primary rounded-full mt-4">Add Money</button>
                    </fieldset>
                </div>
            </div>
        </div>
    </section>


    <section id="cashout" class="px-6 hidden">
        <h1 class="text-[18px] font-semibold py-4">Cashout</h1>

        <div class="form">
            <div class="card bg-base-100 w-full shadow rounded-2xl">
                <div class="card-body">
                    <fieldset class="fieldset space-y-2">
                        <label class="label font-bold text-neutral">Agent Number</label>
                        <input id="cashout-agent" maxlength="11" minlength="11" type="text"
                            class="input rounded-full bg-base-200 w-full" placeholder="Enter 11 digit number" />
                        <label class="label font-bold text-neutral">Amount</label>
                        <input id="cashout-amount" type="text" class="input rounded-full bg-base-200 w-full"
                            placeholder="Enter amount to withdraw" />
                        <label class="label font-bold text-neutral">Pin Number</label>
                        <input id="cashout-pin" maxlength="4" type="password"
                            class="input rounded-full bg-base-200 w-full" placeholder="Enter 4 digit pin number" />
                        <button id="cashout-btn" class="btn btn-primary rounded-full mt-4">Withdraw Money</button>
                    </fieldset>
                </div>
            </div>
        </div>

    </section>



    <section id="transfer-money" class="px-6 hidden">
        <h1 class="text-[18px] font-semibold py-4">Transfer Money</h1>

        <div class="form">
            <div class="card bg-base-100 w-full shadow rounded-2xl">
                <div class="card-body">
                    <fieldset class="fieldset space-y-2">
                        <label class="label font-bold text-neutral">User Account Number</label>
                        <input id="user-account" maxlength="11" minlength="11" type="text"
                            class="input rounded-full bg-base-200 w-full" placeholder="Enter 11 digit number" />
                        <label class="label font-bold text-neutral">Amount</label>
                        <input id="transfer-amount" type="text" class="input rounded-full bg-base-200 w-full"
                            placeholder="Enter amount to transfer" />
                        <label class="label font-bold text-neutral">Pin Number</label>
                        <input id="transfer-pin" maxlength="4" type="password"
                            class="input rounded-full bg-base-200 w-full" placeholder="Enter 4 digit pin number" />
                        <button id="transfer-btn" class="btn btn-primary rounded-full mt-4">Send Now</button>
                    </fieldset>
                </div>
            </div>
        </div>

    </section>




    <section id="pay-bill" class="px-6 hidden">
        <h1 class="text-[18px] font-semibold py-4">Pay Bill</h1>

        <div class="form">
            <div class="card bg-base-100 w-full shadow rounded-2xl">
                <div class="card-body">
                    <fieldset class="fieldset space-y-2">
                        <label class="label font-bold text-neutral">Select to pay</label>

                        <select id="pay-type" class="select input rounded-full bg-base-200 w-full">
                            <option disabled selected>Select back</option>
                            <option value="Electricity">Electricity</option>
                            <option value="Internet">Internet</option>
                            <option value="Insurance">Insurance</option>
                        </select>
                        <label class="label font-bold text-neutral">Biller Account Number</label>
                        <input id="pay-biller" maxlength="11" minlength="11" type="text"
                            class="input rounded-full bg-base-200 w-full" placeholder="Enter 11 digit account number" />
                        <label class="label font-bold text-neutral">Amount to Pay</label>
                        <input id="pay-amount" type="text" class="input rounded-full bg-base-200 w-full"
                            placeholder="Add amount" />
                        <label class="label font-bold text-neutral">Pin Number</label>
                        <input id="pay-pin" maxlength="4" type="password"
                            class="input rounded-full bg-base-200 w-full" placeholder="Enter 4 digit pin number" />
                        <button id="pay-bill-btn" class="btn btn-primary rounded-full mt-4">Pay Now</button>
                    </fieldset>
                </div>
            </div>
        </div>
    </section>



    <script src="./script/machine.js"></script>
    <script src="./script/addMoney.js"></script>
    <script src="./script/cashout.js"></script>
    <script src="./script/transferMoney.js"></script>
    <script src="./script/payBill.js"></script>



</body>

</html>
